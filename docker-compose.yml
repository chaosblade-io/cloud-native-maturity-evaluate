services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: sesora-api
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: sesora-web
    restart: unless-stopped
    environment:
      BACKEND_HOST: api
      BACKEND_PORT: 8000
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:80"